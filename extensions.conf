[default]
; Extension 3000: Multilingual Voice Agent
exten => 3000,1,NoOp(Starting Multilingual Voice Agent)
 same => n,Answer()
 same => n,AGI(voice_agent.py)
 same => n,Hangup()

exten => 300,1,Goto(default,3000,1)

; Allow dialing between 2000 and 5678
exten => 2000,1,Dial(PJSIP/2000)
exten => 5678,1,Dial(PJSIP/5678)

; Handle invalid extensions
exten => s,1,Log(NOTICE, Incoming call to ${EXTEN})
 same => n,Hangup()
